      - text: /Monki
    - paragraph [ref=e119]: Monki notenpasta’s zijn in IJsselstein gemaakt van biologische pinda's, noten en zaden. Er zijn 15 soorten. Alle 100% notenpasta's zijn in consumentenverpakking van 330 gram. Van pindakaas en tahin zijn er ook potten van 650 gram. Het productieproces omvat de stappen roosteren, eventueel schonen en mengen, malen en afvullen. Bij de witte amandelpasta en witte cashewpasta vindt geen roosteren plaats. Monki biologische notenpasta’s zijn verkrijgbaar in natuurvoedingswinkels en andere speciaalzaken in verschillende landen in West Europa; voor deze landen zijn de etiketten van de juiste taal voorzien.
