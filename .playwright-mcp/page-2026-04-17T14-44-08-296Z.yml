      - text: /Horizon
    - paragraph [ref=e96]: Horizon is ons merk met het breedste assortiment. Onder dit label produceren we biologische stropen, noten- en zadenpasta's en verpakte noten, zuidvruchten en zaden. Horizon notenpasta’s zijn in IJsselstein gemaakt van biologische pinda's, noten en zaden. Er zijn 17 soorten. Alle soorten zijn verkrijgbaar in een verpakking van 350 gram. Een aantal soorten is ook verkrijgbaar in 175 of 650 gram. Het assortiment van Horizon is verkrijgbaar in natuurvoedingswinkels en andere speciaalzaken in Nederland en België.
