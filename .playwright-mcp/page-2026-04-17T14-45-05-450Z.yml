    - generic [ref=e110]:
      - paragraph [ref=e111]: Horizon Natuurvoeding is in 1978 opgericht. Onder onze merken Horizon, Monki, Jori en Krekeltje verkopen wij 100 % noten- en zadenpasta's van biologische topkwaliteit. Onder het merk Horizon verkopen we ook biologische stropen en verpakte noten, zaden en zuidvruchten. Grootverbruikers, zoals horeca en bakkerijen, kunnen we op maat bedienen met ingrediënten.
      - paragraph [ref=e112]: De hele productielijn hebben we in eigen beheer. De grondstoffen komen rechtstreeks van de boerencoöperaties en toeleveranciers naar onze vestiging in IJsselstein, waar we de noten, zaden en zuidvruchten verwerken en verpakken.
      - paragraph [ref=e113]: Vanaf het begin heeft Horizon Natuurvoeding zich gericht op de productie en verkoop van volwaardige voeding, die bijdraagt aan de gezondheid van mensen, samenleving en aarde. We kiezen dan ook bewust voor biologische grondstoffen. Aan onze boerencoöperaties en toeleveranciers bieden we afzetgarantie en eerlijke prijzen. Dat leidt vaak tot jarenlange en mooie samenwerkingen. Daar zijn we trots op!
