      - text: /Jori
    - paragraph [ref=e119]: Met ons merk Jori maken we gezinnen blij! Veel mensen in Nederland zijn opgegroeid met Jori pindakaas. Als kind kregen zij al Jori pindakaas op hun brood naar school en nu genieten hun eigen kinderen ervan. Naast pure pindakaas maken we onder het merk Jori ook viernotenpasta met pinda, cashewnoot, hazelnoot en amandelen. Jori pindakaas en notenpasta zijn gemaakt van geroosterde en gemalen pinda's en noten en bevat naast een snufje zeezout verder geen toevoegingen. Komt er een olielaagje bovendrijven? Even roeren voor gebruik en smeren maar. Jori is verkrijgbaar in potten van 350 en 650 gram.
