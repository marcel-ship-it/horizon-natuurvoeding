  - generic [ref=e106]:
    - generic [ref=e107]:
      - generic [ref=e108]:
        - heading "VISIE & MISSIE" [level=1] [ref=e109]
        - paragraph [ref=e111]: Horizon Natuurvoeding produceert en verkoopt gezonde en natuurlijke voeding, die bijdraagt aan een duurzame samenleving. We kiezen bewust voor 100 % biologische en plantaardige grondstoffen en werken zonder kunstmatige toevoegingen en toegevoegde suiker. Horizon Natuurvoeding haalt alle biologische grondstoffen zoveel mogelijk rechtstreeks bij de bron. Ons uitgangspunt is dat we langjarig en goed samenwerken met vaste leveranciers, die garant staan voor biologische producten van topkwaliteit. De oorsprong van onze missie en visie ligt in het vegetarisme, de macrobiotiek en natuurvoeding. In de jaren zeventig van de vorige eeuw kreeg het gezondheidsaspect van voeding steeds meer aandacht en ook het milieu werd een belangrijke zaak. Als reactie op de steeds sterker vervuilde wereld ontstond toen de ecologische beweging, waar de biologische landbouw uit voortgekomen is.
      - generic [ref=e114]: Earth day 1970 (begin jaren Horizon Natuurvoeding BV)
    - generic [ref=e116]:
      - heading "ONS TEAM" [level=1] [ref=e117]
      - paragraph [ref=e118]: "Horizon Natuurvoeding is een bedrijf met een familiaire sfeer. Onze medewerkers verbinden zich met hart en ziel aan 'hun' bedrijf en blijven vaak lange tijd bij ons in dienst. Daarmee hebben we dus veel ervaring, kennis en expertise in huis. Daar zijn we trots op! We hebben acht afdelingen: administratie, export, import, verkoop, kwaliteit, NPD (New Product Development), logistiek en productie."
    - generic [ref=e119]:
      - generic [ref=e120]:
        - heading "GESCHIEDENIS" [level=1] [ref=e121]
        - generic [ref=e122]:
          - paragraph [ref=e123]: "Horizon Natuurvoeding is in 1978 opgericht door pionier en ondernemer Gaston Smit. De hippietijd, waarin het merk Horizon werd geboren, was volgens Gaston magisch. Vernieuwende ideeën zetten hele groepen mensen in beweging. De hippies hadden het licht gezien en wisten precies welke kant het op moest met de wereld. Ze kregen een hekel aan polyester en gif en gingen zich anders kleden en voeden. Dat biologische landbouw dé weg was om te gaan, voelden ze aan hun water. Gaston wist ook: als hij de wereld wilde verbeteren dan moest hij bij zichzelf beginnen."
          - paragraph [ref=e124]: "Geïnspireerd door het vegetarisme en de macrobiotiek kwam Gaston op het idee om tahin op de markt te brengen. Bij een Griekse vriend kocht hij witte tahin in. Aan de keukentafel van zijn studentenkamer vulde hij eigenhandig potjes af. De zelfgemaakte etiketten plakte hij er kaarsrecht op. De kersverse ondernemer wist: zorgvuldigheid is de basis voor een gezond bedrijf."
          - paragraph [ref=e125]:
            - text: "In die tijd werden de eerste biologische merken gedoopt met betekenisvolle namen als Groene Aarde of Gedegen Kost. Gaston wilde echter een naam waarmee zijn producten niet in een hokje gestopt konden worden. Horizon vond hij internationaal goed klinken. Bovendien sprak de ongrijpbaarheid van de einder hem aan: je loopt er naartoe maar het blijft toch ver weg, zoals een ideaal waar je naar kunt hunkeren en verlangen. Op een boerderij in Friesland heeft hij samen met Ramon van de Werken, een bevriende kunstenaar, het logo ontworpen. Ze zaten aan een tafel en probeerden van alles uit. Op een gegeven moment trokken ze een streep, die de letters een stukje afsnijdt, alsof de letters vanachter de horizon omhoog komen. Ook kunstenaar Ramon bleef betrokken als schilder en ontwerper van de onconventionele etiketten. De keukentafel wordt al snel te klein en de productie verhuisde naar een werkruimte in Ermelo."
            - text: In 1985 verhuist Horizon Natuurvoeding naar de huidige bedrijfsruimte in IJsselstein. Het bedrijf is gegroeid tot een BV met werk voor ongeveer 35 medewerkers. In de zomer van 2022 verkoopt Gaston Smit zijn levenswerk aan lange termijn investeerder Anders Invest Food & Agri en bio pionier Poppe Braam. Samen met alle betrokken en deskundige medewerkers willen Anders Invest Food & Agri en Poppe Braam het bedrijf verder laten bloeien!
      - generic [ref=e126]:
        - generic [ref=e129]: Links founder Gaston Smit
        - generic [ref=e132]: Eerste potten notenpasta
    - generic [ref=e134]:
      - heading "RELATIES" [level=1] [ref=e135]
      - paragraph [ref=e137]: "Traceerbaarheid (weten waar de grondstoffen vandaan komen) is voor ons een vanzelfsprekendheid. We doen alleen zaken met leveranciers waarbij we een goed gevoel hebben en die, net als wijzelf, hart hebben voor biologische landbouw. In de praktijk resulteert dat in langjarige samenwerkingen. Met de meeste leveranciers hebben we al tientallen jaren een trouwe relatie en onze inkopers en kwaliteitsmedewerkers bezoeken hen persoonlijk voor de audits. Onze amandelen kopen we sinds 1998 in bij boerencoöperatie Almendrera del Sur in Andalusië; omdat wij met ze kunnen lezen en schrijven, verzorgen wij inmiddels hun gehele afzet in Europa. Onze manier van samenwerken geeft rust aan beide partijen: wij kunnen vertrouwen op de gewenste topkwaliteit en zij hebben afzetgarantie met een eerlijke verkoopprijs."
